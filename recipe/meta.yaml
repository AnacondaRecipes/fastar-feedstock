{% set name = "fastar" %}
{% set version = "0.11.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: aa7f100f7313c03fdb20f1385927ba95671071ba308ad0c1763fef295e1895ce

build:
  number: 0
  script: 
    - "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vvv"
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  skip: true # [py<38]

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("rust") }}
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - zstd {{ zstd }}
    - maturin >=1.9.0,<2.0
    - cargo-bundle-licenses ==4.2.0
  run:
    - python

# upstream tests on linux; most of the below are due to OS-level
# differences in error message strings
{% set disabled_tests = "" %}
{% set disabled_tests = disabled_tests + " not unpack_raises_if_file_would_overwrite_existing_directory" %} # [osx]
{% set disabled_tests = disabled_tests + " not append_preserves_directory_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not append_preserves_file_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not close_closes_archive" %} # [win]
{% set disabled_tests = disabled_tests + " and not context_manager_closes_archive" %} # [win]
{% set disabled_tests = disabled_tests + " and not open_raises_if_file_does_not_exist" %} # [win]
{% set disabled_tests = disabled_tests + " and not open_raises_if_insufficient_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not open_raises_if_no_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not open_raises_if_path_is_directory" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_keeps_contents_of_conflicting_directories" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_overwrites_permissions_of_conflicting_directories" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_overwrites_permissions_of_conflicting_files" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_preserves_directory_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_preserves_file_permissions" %} # [win]
{% set disabled_tests = disabled_tests + " and not unpack_raises_if_file_would_overwrite_existing_directory" %} # [win]
{% set disabled_tests = disabled_tests + " not test_zstd" %} # [linux]

test:
  source_files:
    - tests
  imports:
    - fastar
  requires:
    - pip
    - pytest >=8.3.5
    - mypy >=1.14.1
  # Anaconda does not support version 7.1.2 of psutil
    - psutil >=7.0.0
    - pytest-codspeed >=2.2.1
    - backports.zstd >=1.1.0
  commands:
    - pip check
    - pytest tests -k "{{ disabled_tests }}" -vv --tb=long --color=yes
    - mypy -p fastar

about:
  home: https://github.com/DoctorJohn/fastar
  summary: High-level bindings for the Rust tar crate
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  description: |
    The fastar library wraps the Rust tar, flate2, and zstd crates,
    providing a high-performance way to work with compressed and uncompressed tar archives in Python.
  dev_url: https://github.com/DoctorJohn/fastar
  doc_url: https://github.com/DoctorJohn/fastar

extra:
  recipe-maintainers:
    - bollwyvl
